# GitHub Secret Scanning configuration
# https://docs.github.com/en/code-security/secret-scanning/about-secret-scanning
#
# wrangler.toml intentionally contains public-facing keys that are safe to commit:
#   - VITE_STRIPE_PUBLIC_KEY  (pk_test_* / pk_live_*) — Stripe publishable key
#   - VITE_TURNSTILE_SITE_KEY — Cloudflare Turnstile site key
#
# Real secrets (STRIPE_SECRET_KEY, WILDAPRICOT_API_KEY, RESEND_API_KEY, etc.)
# are managed via `wrangler secret put` and never stored in this repo.
paths-ignore:
  - "wrangler.toml"
